<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plott - Seu próximo filme favorito</title>
    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/main.js"></script>

</head>
<body>

    <section class="start">
        <div class="header">
            <video id="bg-video-player" autoplay muted loop playsinline class="bg-video">
                Seu navegador não suporta vídeos.
            </video>

            <div class="overlay"></div>

            <div class="header-content">
                <h1>
                    O próximo filme para você assistir<br>
                    Baseado no que você já gosta<br>
                    Em segundos. :3
                </h1>
                
            </div>
        </div>
        <span class="scroll-indicator">Começar Agora</span>
    </section>

 <section class="recommender-section">
        
        <div class="left-block">
            <h2>Quais filmes você já gosta? (Até 4)</h2>
            
            <div class="search-wrapper">
                <input type="text" id="movie-search" placeholder="Digite o nome de um filme..." autocomplete="off">
                
                <ul id="suggestions-list" class="suggestions-dropdown"></ul>
            </div>

            <div id="selected-posters" class="posters-grid">
                <div class="poster-placeholder">+</div>
                <div class="poster-placeholder">+</div>
                <div class="poster-placeholder">+</div>
                <div class="poster-placeholder">+</div>
            </div>
        </div>

        <div class="right-block">
            <h2>Descreva o filme que você procura</h2>
            
            <textarea id="description-input" rows="8" placeholder="Ex: Quero um filme de suspense psicológico com um plot twist no final, parecido com Ilha do Medo..."></textarea>
            
            <button id="generate-btn">Achar meu filme</button>
        </div>

    </section>

</body>
</html>
